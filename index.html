<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<title>Mellékmérő-átírás – Gyors kivonat</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

/* ===== eredeti stílus változatlan ===== */
:root{
  --bg:#EEF3F1;
  --surface:#FFFFFF;
  --surface-soft:#F5F9F7;
  --ink:#16302C;
  --ink-soft:#5B7872;
  --border:#D7E2DE;
  --teal:#0F766E;
  --teal-dark:#0B5A54;
  --amber-bg:#FBF1E2;
  --amber-border:#EAD2A0;
  --amber-ink:#7C4A12;
  --error:#B42318;
  --meter-bg:#0B2B27;
  --meter-digit:#5EEAD4;
  --radius:14px;
  --shadow:0 1px 2px rgba(20,43,39,.05), 0 10px 28px -16px rgba(20,43,39,.18);
}

*{ box-sizing:border-box; }

.page{ min-height:100%; background:var(--bg); font-family:'IBM Plex Sans',sans-serif; color:var(--ink); padding:32px 18px 64px; }
.app{ max-width:600px; margin:0 auto; }

.card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:22px; }

.dropzone{ border:1.5px dashed var(--border); border-radius:12px; padding:28px 16px; text-align:center; cursor:pointer; background:var(--surface-soft); }
.dropzone.drag{ border-color:var(--teal); background:#EAF5F3; }

.btn{ padding:11px 20px; border-radius:10px; cursor:pointer; border:none; font-weight:600; }
.btn-primary{ background:var(--teal); color:#fff; width:100%; margin-top:18px; }
.btn-primary:disabled{ background:#CBD9D5; }

.status{ margin-top:10px; font-size:.86rem; min-height:1.2em; color:var(--ink-soft); }
.status.error{ color:var(--error); }
.status.loading{ color:var(--teal-dark); }

.filelist{ display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; }

.chip{ display:flex; gap:6px; padding:6px 10px; border:1px solid var(--border); border-radius:999px; font-size:.82rem; }

.result-card{ margin-top:18px; }
.meter{ padding:12px; border:1px solid var(--border); border-radius:12px; margin-top:10px; }

</style>
</head>

<body>
<div class="page">
  <div class="app">

    <div class="card">
      <div class="dropzone" id="dropzone">Húzd ide vagy kattints</div>
      <input type="file" id="fileInput" multiple hidden>

      <div class="filelist" id="filelist"></div>

      <button class="btn btn-primary" id="processBtn" disabled>
        Adatok kiolvasása
      </button>

      <div class="status" id="status"></div>
    </div>

    <div class="card result-card" id="resultCard" hidden>
      <h3>Eredmény</h3>
      <div id="result"></div>
      <button id="resetBtn">Újra</button>
    </div>

  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
